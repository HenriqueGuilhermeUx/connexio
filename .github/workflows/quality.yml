name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - agent/**

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --silent --no-audit --no-fund

      - name: Check Expo dependencies
        run: npx expo install --check

      - name: TypeScript
        id: typescript
        shell: bash
        run: |
          set +e
          npm run typecheck --silent > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 3

      - name: ESLint
        run: npm run lint --silent
