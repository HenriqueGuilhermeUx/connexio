name: Build Connexio Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Arquivo Android
        required: true
        default: apk
        type: choice
        options:
          - apk
          - play-store

permissions:
  contents: read

jobs:
  build:
    name: Gerar Android
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPECTED_ANDROID_PACKAGE: br.com.alternativeventures.connexio

    steps:
      - name: Verificar token Expo
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Crie o secret EXPO_TOKEN em Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Baixar código do Connexio
        uses: actions/checkout@v5
        with:
          ref: agent/supabase-foundation

      - name: Preparar Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Preparar Expo e EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Validar pacote configurado
        shell: bash
        run: |
          RESOLVED_PACKAGE=$(node -e "const app=require('./app.json'); process.stdout.write(app.expo?.android?.package || '')")
          echo "Pacote configurado: $RESOLVED_PACKAGE"
          if [ "$RESOLVED_PACKAGE" != "$EXPECTED_ANDROID_PACKAGE" ]; then
            echo "Pacote incorreto. Esperado: $EXPECTED_ANDROID_PACKAGE"
            exit 1
          fi

      - name: Recriar projeto Android limpo
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Validar pacote no projeto Android
        shell: bash
        run: |
          echo "Conferindo applicationId nativo..."
          if ! grep -Eq "applicationId[[:space:]]+['\"]${EXPECTED_ANDROID_PACKAGE}['\"]" android/app/build.gradle; then
            echo "O projeto Android não contém o applicationId esperado."
            grep -n "applicationId" android/app/build.gradle || true
            exit 1
          fi
          echo "applicationId confirmado: $EXPECTED_ANDROID_PACKAGE"

      - name: Definir tipo de arquivo
        shell: bash
        run: |
          if [ "${{ inputs.build_type }}" = "play-store" ]; then
            echo "EAS_PROFILE=production" >> "$GITHUB_ENV"
            echo "OUTPUT_FILE=connexio-play-store-${{ github.run_number }}.aab" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=connexio-play-store-${{ github.run_number }}" >> "$GITHUB_ENV"
          else
            echo "EAS_PROFILE=preview" >> "$GITHUB_ENV"
            echo "OUTPUT_FILE=connexio-teste-${{ github.run_number }}.apk" >> "$GITHUB_ENV"
            echo "ARTIFACT_NAME=connexio-apk-teste-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Gerar arquivo Android
        run: eas build --platform android --profile "$EAS_PROFILE" --local --non-interactive --output "./$OUTPUT_FILE"

      - name: Preparar arquivos da versão
        shell: bash
        run: |
          mkdir -p release-output
          cp "$OUTPUT_FILE" release-output/

          if [ "${{ inputs.build_type }}" = "play-store" ]; then
            keytool -printcert -rfc -jarfile "$OUTPUT_FILE" > release-output/upload_certificate.pem
            keytool -printcert -jarfile "$OUTPUT_FILE" | tee release-output/upload_certificate_info.txt
            echo "Certificado público gerado para redefinição da chave de upload no Google Play."
          fi

      - name: Disponibilizar para download
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release-output
          if-no-files-found: error
          retention-days: 14
